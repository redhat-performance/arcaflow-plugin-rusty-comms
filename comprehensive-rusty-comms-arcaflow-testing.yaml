    msg_count: 100000
    warmup_iterations: 100
    quiet: true

  - mechanisms: [uds]
    message_size: 8192
    msg_count: 100000
    warmup_iterations: 100
    quiet: true

  - mechanisms: [uds]
    message_size: 65536
    msg_count: 100000
    warmup_iterations: 100
    quiet: true

  # --- TCP async iter ---
  - mechanisms: [tcp]
    message_size: 64
    msg_count: 100000
    blocking: false
    warmup_iterations: 100
    quiet: true

  - mechanisms: [tcp]
    message_size: 512
    msg_count: 100000
    blocking: false
    warmup_iterations: 100
    quiet: true

  - mechanisms: [tcp]
    message_size: 1024
    msg_count: 100000
    blocking: false
    warmup_iterations: 100
    quiet: true

  - mechanisms: [tcp]
    message_size: 4096
    msg_count: 100000
    blocking: false
    warmup_iterations: 100
    quiet: true

  - mechanisms: [tcp]
    message_size: 8192
    msg_count: 100000
    blocking: false
    warmup_iterations: 100
    quiet: true

  - mechanisms: [tcp]
    message_size: 65536
    msg_count: 100000
    blocking: false
    warmup_iterations: 100
    quiet: true

  # --- TCP blocking iter ---
  - mechanisms: [tcp]
    message_size: 64
    msg_count: 100000
    warmup_iterations: 100
    quiet: true

  - mechanisms: [tcp]
    message_size: 512
    msg_count: 100000
    warmup_iterations: 100
    quiet: true

  - mechanisms: [tcp]
    message_size: 1024
    msg_count: 100000
    warmup_iterations: 100
    quiet: true

  - mechanisms: [tcp]
    message_size: 4096
    msg_count: 100000
    warmup_iterations: 100
    quiet: true

  - mechanisms: [tcp]
    message_size: 8192
    msg_count: 100000
    warmup_iterations: 100
    quiet: true

  - mechanisms: [tcp]
    message_size: 65536
    msg_count: 100000
    warmup_iterations: 100
    quiet: true

  # --- SHM async iter ---
  # REMOVED: SHM async uses Tokio ring buffers that require
  # more /dev/shm than containers provide (64MB default).
  # These tests only work on bare-metal hosts.  Run the
  # original comprehensive-rusty-comms-testing.py with
  # --standalone-only --mechanisms shm --async-only for
  # SHM async benchmarks.

  # --- SHM blocking iter (uses shm-direct under the hood) ---
  # Original script adds --blocking --shm-direct for SHM blocking.
  # Max payload 8KB, so sizes capped at 8192.
  - mechanisms: [shm]
    message_size: 64
    msg_count: 100000
    shm_direct: true
    warmup_iterations: 100
    quiet: true

  - mechanisms: [shm]
    message_size: 512
    msg_count: 100000
    shm_direct: true
    warmup_iterations: 100
    quiet: true

  - mechanisms: [shm]
    message_size: 1024
    msg_count: 100000
    shm_direct: true
    warmup_iterations: 100
    quiet: true

  - mechanisms: [shm]
    message_size: 4096
    msg_count: 100000
    shm_direct: true
    warmup_iterations: 100
    quiet: true

  - mechanisms: [shm]
    message_size: 8192
    msg_count: 100000
    shm_direct: true
    warmup_iterations: 100
    quiet: true

  # --- SHM shm-direct only iter ---
  # REMOVED: Duplicate of SHM blocking iter above.
  # --shm-direct auto-enables blocking, so "blocking + shm-direct"
  # and "shm-direct only" produce identical runs.

  # --- PMQ async iter ---
  # REMOVED: PMQ async uses Tokio runtime which cannot
  # reliably read from POSIX message queues inside a
  # container. Fails with "queue consistently empty".
  # Run on bare metal with the original Python script.

  # --- PMQ blocking iter ---
  - mechanisms: [pmq]
    message_size: 512
    msg_count: 100000
    warmup_iterations: 100
    quiet: true

  - mechanisms: [pmq]
    message_size: 1024
    msg_count: 100000
    warmup_iterations: 100
    quiet: true

  - mechanisms: [pmq]
    message_size: 4096
    msg_count: 100000
    warmup_iterations: 100
    quiet: true

  - mechanisms: [pmq]
    message_size: 8100
    msg_count: 100000
    warmup_iterations: 100
    quiet: true

