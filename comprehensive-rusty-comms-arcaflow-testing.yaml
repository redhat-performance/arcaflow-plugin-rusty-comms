# Comprehensive IPC Benchmark Suite — Arcaflow Input
#
# Converted from comprehensive-rusty-comms-testing.py
# (standalone tests only, no container-to-container tests).
#
# Mechanisms: uds, tcp, shm, pmq
# Modes: async (blocking: false), blocking, shm-direct
# Test types: iteration-based (100k) and duration-based (10s)
# Additional: one-way only, round-trip only, concurrency,
#             send-delay latency profiling
#
# Message sizes:
#   General (UDS, TCP): 64, 512, 1024, 4096, 8192, 65536
#   PMQ:                512, 1024, 4096, 8100
#   SHM blocking/direct: 64, 512, 1024, 4096, 8192 (8KB max)
#   SHM async:          EXCLUDED — needs bare-metal /dev/shm
#
# Container notes:
#   - SHM async tests set buffer_size to fit in 64MB /dev/shm
#   - SHM blocking/shm-direct bypass normal SHM buffer
#   - SHM and PMQ are always in separate test entries to
#     avoid /dev/shm resource conflicts

tests:

  # =============================================================
  # ITERATION TESTS (50,000 messages)
  # =============================================================

  # --- UDS async iter ---
  - mechanisms: [uds]
    message_size: 64
    msg_count: 100000
    blocking: false
    warmup_iterations: 100
    quiet: true

  - mechanisms: [uds]
    message_size: 512
    msg_count: 100000
    blocking: false
    warmup_iterations: 100
    quiet: true

  - mechanisms: [uds]
    message_size: 1024
    msg_count: 100000
    blocking: false
    warmup_iterations: 100
    quiet: true

  - mechanisms: [uds]
    message_size: 4096
    msg_count: 100000
    blocking: false
    warmup_iterations: 100
    quiet: true

  - mechanisms: [uds]
    message_size: 8192
    msg_count: 100000
    blocking: false
    warmup_iterations: 100
    quiet: true

  - mechanisms: [uds]
    message_size: 65536
    msg_count: 100000
    blocking: false
    warmup_iterations: 100
    quiet: true

  # --- UDS blocking iter ---
  - mechanisms: [uds]
    message_size: 64
    msg_count: 100000
    warmup_iterations: 100
    quiet: true

  - mechanisms: [uds]
    message_size: 512
