  # =============================================================
  # ONE-WAY ONLY TESTS (max throughput, no round-trip overhead)
  # 4096 bytes, 100K messages, blocking mode
  # =============================================================

  - mechanisms: [uds]
    message_size: 4096
    msg_count: 100000
    one_way: true
    warmup_iterations: 100
    quiet: true

  - mechanisms: [tcp]
    message_size: 4096
    msg_count: 100000
    one_way: true
    warmup_iterations: 100
    quiet: true

  - mechanisms: [shm]
    message_size: 4096
    msg_count: 100000
    one_way: true
    shm_direct: true
    warmup_iterations: 100
    quiet: true

  - mechanisms: [pmq]
    message_size: 4096
    msg_count: 100000
    one_way: true
    warmup_iterations: 100
    quiet: true

  # =============================================================
  # ROUND-TRIP ONLY TESTS (pure latency, no one-way phase)
  # 4096 bytes, 100K messages, blocking mode
  # =============================================================

  - mechanisms: [uds]
    message_size: 4096
    msg_count: 100000
    round_trip: true
    warmup_iterations: 100
    quiet: true

  - mechanisms: [tcp]
    message_size: 4096
    msg_count: 100000
    round_trip: true
    warmup_iterations: 100
    quiet: true

  # SHM (shm-direct) only supports one-way; round_trip skipped.
  # An extra UDS round-trip at 8192 bytes is added instead.
  - mechanisms: [uds]
    message_size: 8192
    msg_count: 100000
    round_trip: true
    warmup_iterations: 100
    quiet: true

  - mechanisms: [pmq]
    message_size: 4096
    msg_count: 100000
    round_trip: true
    warmup_iterations: 100
    quiet: true

  # =============================================================
  # CONCURRENCY TESTS (scaling under parallel load)
  # 4096 bytes, 100K messages, blocking mode
  # =============================================================

  # --- concurrency=2 ---
  - mechanisms: [uds]
    message_size: 4096
    msg_count: 100000
    concurrency: 2
    warmup_iterations: 100
    quiet: true

  - mechanisms: [tcp]
    message_size: 4096
    msg_count: 100000
    concurrency: 2
    warmup_iterations: 100
    quiet: true

